apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cnpg
  namespace: flux-system
spec:
  interval: 1h
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloud-native-pg
  namespace: cnpg-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cnpg
      version: 0.1.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system